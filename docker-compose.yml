version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: qubomax-postgres
    environment:
      POSTGRES_DB: qubomax
      POSTGRES_USER: qubomax
      POSTGRES_PASSWORD: qubomax
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U qubomax -d qubomax" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
