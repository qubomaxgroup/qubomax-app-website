spring.application.name=qubomax-sales-command-center-backend
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/qubomax}
spring.datasource.username=${DB_USERNAME:qubomax}
spring.datasource.password=${DB_PASSWORD:qubomax}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

aws.region=${AWS_REGION:us-east-1}
aws.secrets.sp-api-client-secret-name=${SP_API_CLIENT_SECRET_NAME:SP_API_CLIENT_SECRET}
aws.secrets.sp-api-refresh-token-name=${SP_API_REFRESH_TOKEN_NAME:SP_API_REFRESH_TOKEN}

spapi.base-url=${SP_API_BASE_URL:https://sellingpartnerapi-na.amazon.com}
spapi.lwa-token-url=${SP_API_LWA_TOKEN_URL:https://api.amazon.com/auth/o2/token}
spapi.lwa.client-id=${SP_API_CLIENT_ID:}
spapi.marketplace-id-default=${SP_API_MARKETPLACE_ID_DEFAULT:ATVPDKIKX0DER}

app.security.jwt-secret=${JWT_SECRET:replace-with-strong-secret-at-least-32-characters}
app.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:28800}
app.auth.internal.username=${APP_INTERNAL_USERNAME:admin}
app.auth.internal.password=${APP_INTERNAL_PASSWORD:change-me}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
